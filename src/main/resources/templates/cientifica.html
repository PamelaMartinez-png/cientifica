<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Cientifica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
<div class="container text-center">
    <h1>Calculadora cientifica</h1>
    <div class="mb-3">
<!--        <label for="exampleInputEmail1" class="form-label"></label>-->
        <input type="email" class="form-control fs-2" id="display" aria-describedby="emailHelp" value="0"  readonly style="text-align:right;background-color: black;color: white  ">
<!--        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>-->
    </div>

    <div class="card">
        <div class="card-body">

            <div class="row" style="margin-bottom: 10px">
        <div class="col">
            <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setDigito('7')" >7</button>
        </div>
        <div class="col">
            <button type="button" class="btn btn-outline-primary w-100  fs-2" onclick="setDigito('8')">8</button>
        </div>
        <div class="col">
            <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setDigito('9')">9</button>
        </div>
        <div class="col">
            <button type="button" class="btn btn-outline-success w-100 fs-2" onclick="setOperador('+')">+</button>
        </div>
    </div>
            <div class="row" style="margin-bottom: 10px" >
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setDigito('4')">4</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setDigito('5')">5</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setDigito('6')">6</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-success w-100 fs-2" onclick="setOperador('-')">-</button>
                </div>
            </div>
            <div class="row" style="margin-bottom: 10px">
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setDigito('1')">1</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setDigito('2')">2</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setDigito('3')">3</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-success w-100 fs-2" onclick="setOperador('*')">x</button>
                </div>
            </div>
            <div class="row" style="margin-bottom: 10px">
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setDigito('0')">0</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setOperador('.')">.</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-secondary w-100 fs-2" onclick="obtenerResultado()">=</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-success w-100 fs-2" onclick="setOperador('/')">/</button>
                </div>
            </div>
            <div class="row" style="margin-bottom: 10px">
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="borrar()">C</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setOperador('raiz')">Raiz</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-primary w-100 fs-2" onclick="setOperador('Log')">Log</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-success w-100 fs-2" onclick="setOperador('^')">X<sup>y</sup></button>
                </div>
            </div>
        </div>
        <div class="card-footer">
            Diseñado y desarrollado por: <strong>Pamela Martinez</strong>
        </div>
        </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script th:src="@{/js/cientifica.js}"></script>
</body>
</html>
